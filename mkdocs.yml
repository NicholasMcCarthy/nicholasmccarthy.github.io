site_name: Nicholas McCarthy
site_url: https://nicholasmccarthy.github.io

theme:
  name: terminal
  palette: default
  features:
    - footer.prev_next
    - navigation.side.indexes

nav:
  - Home: index.md
  - Projects: Projects.md
  - Publications: Publications.md

# Extensions
markdown_extensions:
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

  - toc:
      permalink: true

plugins:
  - search
  - roamlinks
  - mermaid2

extra_javascript:
  - js/wingdings-overlay.js
